<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Master SaaS - Tenants</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#f1f5f9; color:#0f172a; }
    header { background:#0f172a; color:#fff; padding:14px 20px; display:flex; justify-content:space-between; }
    main { max-width:1100px; margin:20px auto; padding:0 16px; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
    .card { background:#fff; border-radius:10px; padding:16px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
    input, textarea, select, button { width:100%; padding:10px; margin-top:8px; border-radius:8px; border:1px solid #cbd5e1; }
    button { background:#0ea5e9; color:#fff; border:none; cursor:pointer; }
    table { width:100%; border-collapse:collapse; margin-top:12px; }
    th, td { border-bottom:1px solid #e2e8f0; text-align:left; padding:8px; font-size:14px; }
    .ok { color:#166534; font-size:13px; min-height:20px; }
  </style>
</head>
<body>
  <header>
    <strong>Master SaaS</strong>
    <a href="/master/logout" style="color:#fff;">Sair</a>
  </header>
  <main>
    <div class="grid">
      <section class="card">
        <h3>Criar/Atualizar Tenant</h3>
        <input id="tenant-slug" placeholder="slug (ex: antonio)" />
        <input id="tenant-nome" placeholder="Nome fantasia" />
        <input id="tenant-domains" placeholder="domínios separados por vírgula" />
        <select id="tenant-ativo">
          <option value="true">Ativo</option>
          <option value="false">Inativo</option>
        </select>
        <button id="btn-salvar-tenant">Salvar tenant</button>
        <div class="ok" id="tenant-msg"></div>
      </section>

      <section class="card">
        <h3>Branding por Tenant</h3>
        <input id="brand-slug" placeholder="slug do tenant" />
        <input id="brand-nome" placeholder="nome_bingo" />
        <input id="brand-fone" placeholder="telefone_contato" />
        <button id="btn-carregar-brand">Carregar branding</button>
        <button id="btn-salvar-brand">Salvar branding</button>
        <div class="ok" id="brand-msg"></div>
      </section>
    </div>

    <section class="card" style="margin-top:16px;">
      <h3>Tenants cadastrados</h3>
      <table>
        <thead><tr><th>Slug</th><th>Nome</th><th>Ativo</th><th>Domínios</th></tr></thead>
        <tbody id="tenants-body"></tbody>
      </table>
    </section>
  </main>
  <script src="/master/painel.js"></script>
</body>
</html>
